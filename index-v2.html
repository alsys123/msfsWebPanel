<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MSFS Airspeed Indicator</title>

  <style>
    body {
      background: #222;
      color: #eee;
      font-family: sans-serif;
      padding: 20px;
    }

    #asi {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }

    #asi img {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    #needle {
      transform-origin: 50% 50%;
      transform: rotate(0deg);
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">Airspeed Indicator</h2>

<div id="asi">
  <img src="asi_background.png">
  <img id="needle" src="needle.png">
</div>

<script>
async function updateASI() {
  try {
    const res = await fetch("http://10.0.0.216:5000/data");
    const d = await res.json();

    const kts = d.airspeed;

    // Gauge scale
    const MIN = 0;
    const MAX = 160;

    // Convert airspeed to needle angle (-135° to +135°)
    const angle = -135 + (kts - MIN) / (MAX - MIN) * 270;

    document.getElementById("needle").style.transform =
      `rotate(${angle}deg)`;

  } catch (e) {
    console.log("Error fetching data:", e);
  }
}

// Update 5 times per second
setInterval(updateASI, 200);
</script>

</body>
</html>
