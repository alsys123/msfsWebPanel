<div id="asi" style="position: relative; width: 300px; height: 300px;">
  <img src="asi_background_2.png"
       style="position: absolute; width: 100%; height: 100%;">

  <!-- CSS needle -->
  <div id="needle"
       style="
         position: absolute;
         left: 50%;
         top: 50%;
         width: 4px;
         height: 45%;
         background: red;
         transform-origin: 50% 90%;
         transform: translate(-50%, -90%) rotate(0deg);
         border-radius: 2px;
       ">
  </div>
</div>
