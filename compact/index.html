<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MSFS Panels</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../topBar.css">
    <link rel="stylesheet" href="../settings.css">
    
    <!-- Responsive scaling script - LOAD FIRST before other scripts -->
    <script src="../responsiveScale.js"></script>
    
  </head>

  <body>
    <!--<body style="margin:0; padding:0; overflow:hidden;"> -->

    <h4 id="panelTitle"
	style="
	       position:absolute;
	       z-index:9999;
	       color:white;
	       font-size:18px;
	       margin:0;
	       ">
      Aviation Panel </h4>
    
    <div id="topbar">
      <!--
	  <button id="sixPackId"  class="panel-btn" data-panel="sixPack">Six Pack</button>
	  <button id="c172" class="panel-btn" data-panel="c172">C172</button>
	  <button id="g1000" class="panel-btn" data-panel="g1000">G1000</button>
	  <button id="switches" class="panel-btn" data-panel="switches">Switches</button>
	  
	  <button id="engine" class="panel-btn" data-panel="engine">Engine</button>
	  <button id="radio" class="panel-btn" data-panel="radio">Radio</button>
	  -->
	  <div id="panelModeBlock">
	    <div class="panelModeLabel">Panel Mode</div>
	    <div class="panelModeButtons">
	      <button class="modeBtn active" data-mode="off">OFF</button>
	      <button class="modeBtn"        data-mode="local">Test Local</button>
	      <button class="modeBtn"        data-mode="server">Test Server</button>
	      <button class="modeBtn"        data-mode="live">Live</button>
	    </div>
	  </div>
	  
	  <!--      <button id="settingsBtn"
		    class="settings-button">⚙️</button> -->
	  
	  <button id="settingsBtn"
		  style="
			 position:absolute;
			 left:20px;        /* change this to place it */
			 top:20px;         /* change this to place it */
			 width:60px;
			 height:60px;
			 font-size:32px;
			 border-radius:50%;
			 background:#222;
			 color:white;
			 border:2px solid #555;
			 cursor:pointer;
			 z-index:9999;
			 ">
	    ⚙️
	  </button>

	  
    </div>
    
    <div id="panelRoot"
	 style="position:relative;
		width:100vw;
		height:100vh;
		background:#111;">
      
      <button id="hideButtonId"
              style="
                     position:absolute;
		     right:20px;
		     top: 20px;
		     width:70px;
		     height:70px;
		     font-size:16px;
		     font-weight:bold;
		     border-radius:50%;
		     background:linear-gradient(#444, #222);
		     color:white;
		     border:3px solid #666;
		     box-shadow:
                     0 4px 8px rgba(0,0,0,0.6),
                     inset 0 2px 4px rgba(255,255,255,0.15),
                     inset 0 -2px 4px rgba(0,0,0,0.5);
		     cursor:pointer;
		     z-index:9999;
		     transition:transform 0.1s ease, box-shadow 0.1s ease;
		     ">
	Hide
      </button>

    </div>

    
    <!-- SETTINGS WINDOW -->
    <div id="settingsWindow" class="settings-window hidden">
      <div id="settingsHeader" class="settings-header">
	<span>Settings</span>
	<button id="settingsClose" class="close-btn">✖</button>
      </div>
      
      <div class="settings-body">
	<label>Machine IP:</label>
	<input id="ipInput" type="text" placeholder="192.168.1.50">
	
	<label>Port:</label>
	<input id="portInput" type="number" placeholder="5050">
	
	<button id="saveSettings" class="save-btn">Save</button>
	
	<hr>
	
	<button id="helpBtn" class="help-btn">Help / About</button>
	<div id="helpSection" class="help-section hidden">
	</div>
	
	<button id="dumpSimvarsBtn"
		style="margin-top:10px; width:100%; padding:8px;">
	  Dump SimVars
	</button>
	
	<pre id="simvarDump"
	     style="
		    margin-top:10px;
		    max-height:200px;
		    overflow:auto;
		    background:#111;
		    color:#0f0;
		    padding:10px;
		    border:1px solid #444;
		    font-size:12px;
		    display:none;
		    ">
	</pre>
	
      </div>
    </div>
    
    
    <div id="asiTypeBDivId"
	 style="
		position: relative;
		width: 300px;
		height: 300px;
		">
      <img id="asiBg_TypeB"
           src="images/airspeed-emis.jpg"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:1;
		  ">
      <div id="asiNeedleTypeB"
	   style="
		  position:absolute;
		  width:4px;
		  height:135px;
		  background:red;
		  left:50%;
		  top:50%;
		  margin-left:-2px;
		  margin-top:-135px;
		  transform-origin:50% 100%;
		  transform:rotate(0deg);
		  -webkit-transform:rotate(0deg);
		  border-radius:2px;
		  z-index:2;
		  ">
      </div>
      <!--
      <div id="asiTextReadout"
	   style="
		  position:absolute;
		  top:50px;
		  left:50px;
		  z-index:5;
		  ">
	---
      </div>
      -->
<div id="asiTextReadout"
     style="
	    position:absolute;
		  top:50px;
		  left:250px;
		  
	    width: 700px;
            height: 250px;

            overflow-y: scroll;
            overflow-x: hidden;
	    -webkit-overflow-scrolling: touch;
	    
            border: 1px solid #444;
            padding: 6px;
            font-family: monospace;
            background: #000;
            color: #0f0;
	    z-index:5;

	    ">
</div>
<!--  -webkit-user-select:text;
            user-select:text; -->
    </div>
    
    
    <div id="panelContainer"></div>

    <script src="simDataCompact.js?v=108"></script>

    <script src="../utils.js"></script>
    <script src="../settings.js"></script>
    
    <script src="gauges/speedGaugeTypeB.js"></script>
    
    <script src="panelDefsCompact.js"></script>

    <script src="msfsWebPanelCompact.js?v=106"></script>
    
  </body>
</html>
