<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MSFS Airspeed Indicator</title>

  <style>
    body {
      background: #222;
      color: #eee;
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }

    #asi {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
      background: black;
      border-radius: 50%;
      border: 4px solid #555;
    }

    /* Code-generated needle */
    #needle {
      position: absolute;
      width: 4px;
      height: 45%;
      background: red;
      top: 5%;
      left: 50%;
      transform-origin: 50% 90%;
      transform: rotate(0deg);
      border-radius: 2px;
    }
  </style>
</head>

<body>

<h2>Airspeed Indicator</h2>

<div id="asi">
  <div id="needle"></div>
</div>

<script>
async function updateASI() {
  try {
    const res = await fetch("http://10.0.0.216:5000/data");
    const d = await res.json();

    const kts = d.airspeed;
    const MIN = 0;
    const MAX = 160;

    const angle = -135 + (kts - MIN) / (MAX - MIN) * 270;

    document.getElementById("needle").style.transform =
      `rotate(${angle}deg)`;

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(updateASI, 200);
</script>

</body>
</html>
