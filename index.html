      <button id="settingsBtn"
              style="
		     position:absolute;
		     left:20px;        /* change this to place it */

		     width:60px;
		     height:60px;
		     font-size:32px;
		     border-radius:50%;
		     background:#222;
		     color:white;
		     border:2px solid #555;
		     cursor:pointer;
		     z-index:9999;

<div id="panelRoot"
     style="position:relative;
	    width:100vw;
	    height:100vh;
	    background:#111;">
    
    <button id="hideButtonId"
            style="
                   position:absolute;
		   right:20px;
		   top: 20px;
		   width:70px;
		   height:70px;
		   font-size:16px;
		   font-weight:bold;
		   border-radius:50%;
		   background:linear-gradient(#444, #222);
		   color:white;
		   border:3px solid #666;
		   box-shadow:
                   0 4px 8px rgba(0,0,0,0.6),
                   inset 0 2px 4px rgba(255,255,255,0.15),
                   inset 0 -2px 4px rgba(0,0,0,0.5);
		   cursor:pointer;
		   z-index:9999;
		   transition:transform 0.1s ease, box-shadow 0.1s ease;
		   ">
      Hide
    </button>

</div>

    <div id="asiTypeBDivId" style="position: relative; width: 300px; height: 300px;">
      <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/airspeed-emis.jpg"
           style="
	  position:absolute;
	  top:0;
	  left:0;
	  width:100%;
	  height:100%;
	  z-index:1;
	  ">
      <!-- Needle -->
      <div id="asiNeedleTypeB"
           style="

	  height:45%;

	  left:50%;
	  top:50%;

	  border-radius:2px;
	  z-index:2;
	  ">
      </div>
    </div>

    <!-- *** flaps def *** -->
    
    <div id="flapsGaugeDivId" style="
			     position: relative;
			     width: 200px;      /* match your image width */
			     height: 200px;     /* match your image height */
			     ">

      <!-- Your flaps gauge image -->
      <img id="flapsBgDivId"
           src="images/flaps.jpg"
           style="
	  position:absolute;
	  top:0;
	  left:0;
	  width:100%;
	  height:100%;
	  z-index:1;
	  ">

      <!-- Needle -->
      <div id="flapsNeedleDivId"
	   style="
	  position:absolute;
	  width:5px;
	  height:40px;              /* long needle --> future: use percentage*/
	  background:white;
	  left:50%;                 /* center horizontally */
	  top:50%;                  /* center vertically */
	  transform: translate(-50%, -100%); 
	  border-radius:2px;
	  z-index:2;
	  transform-origin: 50% 100%; 
	  clip-path: polygon(
	  40% 0%,      /* softened top point */
	  100% 20%,    /* upper right */
	  100% 80%,    /* lower right */
	  70% 100%,    /* softened bottom point (wider) */
	  30% 100%,    /* softened bottom point (wider) */
	  0% 80%,      /* lower left */
	  0% 20%       /* upper left */
	  );

	  ">
      </div>

    </div>

	  ">

	   style="
	  position:absolute;

	  transform:translate(0%, -50%);
	  background:#ff3333;
	  border-radius:3px;
	  z-index:2;
	  transform-origin:0% 50%;  /* pivot on LEFT end */

      <div id="fuelNeedleRight"

	  position:absolute;
	  width: 20%;              /* extends rightward 50px is 20% */

	  left:68%;                 /* pivot at center */
	  top:50%;
	  transform:translate(-100%, -50%);
	  background:#33aaff;
	  border-radius:3px;
	  z-index:2;
	  transform-origin:100% 50%; /* pivot on RIGHT end */
	  ">
      </div>

    </div>
