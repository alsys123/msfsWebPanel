<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MSFS Airspeed Indicator</title>

  <style>
    body {
      background: #222;
      color: #eee;
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }

    #asi {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Code-generated needle */
    #needle {
      position: absolute;
      width: 4px;
      height: 45%;
      background: red;
      top: 5%;
      left: 50%;
      transform-origin: 50% 90%;
      transform: rotate(0deg);
      border-radius: 2px;
    }
  </style>
</head>

<body>

<h2>Airspeed Indicator</h2>

<div id="asi">
  <canvas id="gauge" width="300" height="300"></canvas>
  <div id="needle"></div>
</div>

<script>
// Draw gauge background once
function drawGauge() {
  const c = document.getElementById("gauge");
  const ctx = c.getContext("2d");
  const cx = 150, cy = 150, r = 140;

  ctx.clearRect(0, 0, 300, 300);

  // Outer bezel
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = "#000";
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = "#666";
  ctx.stroke();

  // Tick marks
  const MIN = 0;
  const MAX = 160;

  for (let kts = MIN; kts <= MAX; kts += 10) {
    const angle = (-135 + (kts - MIN) / (MAX - MIN) * 270) * Math.PI / 180;

    const inner = kts % 20 === 0 ? 100 : 115;
    const outer = 130;

    const x1 = cx + inner * Math.cos(angle);
    const y1 = cy + inner * Math.sin(angle);
    const x2 = cx + outer * Math.cos(angle);
    const y2 = cy + outer * Math.sin(angle);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineWidth = kts % 20 === 0 ? 4 : 2;
    ctx.strokeStyle = "#fff";
    ctx.stroke();

    // Numbers every 20 knots
    if (kts % 20 === 0) {
      const tx = cx + 80 * Math.cos(angle);
      const ty = cy + 80 * Math.sin(angle);
      ctx.fillStyle = "#fff";
      ctx.font = "20px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(kts, tx, ty);
    }
  }
}

drawGauge();

// Update needle
async function updateASI() {
  try {
    const res = await fetch("http://10.0.0.216:5000/data");
    const d = await res.json();

    const kts = d.airspeed;
    const MIN = 0;
    const MAX = 160;

    const angle = -135 + (kts - MIN) / (MAX - MIN) * 270;

    document.getElementById("needle").style.transform =
      `rotate(${angle}deg)`;

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(updateASI, 200);
</script>

</body>
</html>
