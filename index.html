<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MSFS Panels</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="topBar.css">
    <link rel="stylesheet" href="settings.css">
    
    
  </head>

  <body>

    <h4 id="panelTitle" >Aviation Panel</h4>

    <div id="topbar">
      <button id="sixPackId"  class="panel-btn" data-panel="sixPack">Six Pack</button>
      <button id="c172" class="panel-btn" data-panel="c172">C172</button>
      <button id="g1000" class="panel-btn" data-panel="g1000">G1000</button>
      <button id="switches" class="panel-btn" data-panel="switches">Switches</button>
      
      <button id="engine" class="panel-btn" data-panel="engine">Engine</button>
      <button id="radio" class="panel-btn" data-panel="radio">Radio</button>

      <div id="panelModeBlock">
	<div class="panelModeLabel">Panel Mode</div>
	<div class="panelModeButtons">
	  <button class="modeBtn active" data-mode="off">OFF</button>
	  <button class="modeBtn"        data-mode="local">Test Local</button>
	  <button class="modeBtn"        data-mode="server">Test Server</button>
	  <button class="modeBtn"        data-mode="live">Live</button>
	</div>
      </div>

      <button id="settingsBtn" class="settings-button">⚙️</button>
      
    </div>

    <button id="hideButtonId"     >Hide</button>

    
    <!-- SETTINGS WINDOW -->
    <div id="settingsWindow" class="settings-window hidden">
      <div id="settingsHeader" class="settings-header">
	<span>Settings</span>
	<button id="settingsClose" class="close-btn">✖</button>
      </div>
      
      <div class="settings-body">
	<label>Machine IP:</label>
	<input id="ipInput" type="text" placeholder="192.168.1.50">
	
	<label>Port:</label>
	<input id="portInput" type="number" placeholder="5050">
	
	<button id="saveSettings" class="save-btn">Save</button>
	
	<hr>
	
	<button id="helpBtn" class="help-btn">Help / About</button>
	<div id="helpSection" class="help-section hidden">
	</div>
      </div>
    </div>
    
    
    <!--    <div id="asi">
	    <canvas id="asiGauge" width="300" height="300"></canvas>
	    <div id="asiNeedle"></div>
    </div>

    <div id="hdg">
      <canvas id="hdgGauge" width="300" height="300"></canvas>
      <div id="hdgLubber"></div>
    </div>

    <div id="timerClock">
      <canvas id="timerCanvas" width="300" height="300"></canvas>
    </div>
    
    <div id="hdgTypeB">
       <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/backPlate2.png"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:-1;
		  ">
      <canvas id="hdgGaugeTypeB" width="300" height="300"></canvas>
      <canvas id="hdgGaugeTypeB_airplane"></canvas>
      <div id="hdgLubberTypeB"></div>
    </div>

    <div id="attitudeDivId">
      <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/backPlate2.png"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:-1;
		  ">

      <canvas id="attitudeCanvas" width="100" height="100"></canvas>
    </div>

    <div id="turnRateDivId">
             <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/backPlate2.png"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:-1;
		  ">

      <canvas id="turnRateCanvas" width="300" height="300"></canvas>
    </div>

    <div id="vsiCanvasDivId">
       <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/backPlate2.png"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:-1;
		  ">
      <canvas id="vsiCanvas" width="300" height="300"></canvas>
    </div>

    <div id="switchesCanvasId">
      <canvas id="switchesCanvas" width="300" height="300"></canvas>
    </div>

    <div id="trimCanvasId">
      <canvas id="trimCanvas" width="300" height="300"></canvas>
      <div id="trimPointer"></div>
    </div>

    <div id="g1000CanvasDivId">
      <canvas id="g1000Canvas" width="300" height="300"></canvas>
    </div>

    <div id="altGaugeTypeBDivId">
       <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/backPlate2.png"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:-1;
		  ">
      <canvas id="altGaugeTypeB" width="300" height="300"></canvas>
      
    </div>

    <div id="radioStackCanvasDivId">
      <canvas id="radioStackCanvas" width="300" height="300"></canvas>
    </div>

    <div id="c172StackDivId">
      <canvas id="c172Stack" width="300" height="300"></canvas>
    </div>
    
    <div id="trimCanvasTypeBDivId">
      <canvas id="trimCanvasTypeB" width="300" height="300"></canvas>
    </div>

    <div id="fuelCanvasDivId">
      <canvas id="fuelCanvas" width="300" height="300"></canvas>
    </div>
    
    <div id="timerCanvasStyleBDivId">
      <canvas id="timerCanvasStyleB" width="300" height="300"></canvas>
    </div>
    
    <div id="asiTypeBDivId" style="position: relative; width: 300px; height: 300px;">
      <!-- Background image -->
      <img id="asiBg_TypeB"
           src="images/airspeed-emis.jpg"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:1;
		  ">
      <!-- Needle -->
      <div id="asiNeedleTypeB"
           style="
		  position:absolute;
		  width:4px;
		  height:45%;
		  background:red;
		  left:50%;
		  top:50%;
		  transform-origin:50% 90%;
		  transform:translate(-50%, -90%) rotate(0deg);
		  border-radius:2px;
		  z-index:2;
		  ">
      </div>
    </div>

    <!-- *** flaps def *** -->
    
    <div id="flapsGaugeDivId" style="
				     position: relative;
				     width: 200px;      /* match your image width */
				     height: 200px;     /* match your image height */
				     ">

      <!-- Your flaps gauge image -->
      <img id="flapsBgDivId"
           src="images/flaps.jpg"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:1;
		  ">

      <!-- Needle -->
      <div id="flapsNeedleDivId"
	   style="
		  position:absolute;
		  width:10px;
		  height:55px;              /* long needle --> future: use percentage*/
		  background:white;
		  left:50%;                 /* center horizontally */
		  top:50%;                  /* center vertically */
		  transform: translate(-50%, -100%); 
		  border-radius:2px;
		  z-index:2;
		  transform-origin: 50% 100%; 
		  clip-path: polygon(
		  40% 0%,      /* softened top point */
		  100% 20%,    /* upper right */
		  100% 80%,    /* lower right */
		  70% 100%,    /* softened bottom point (wider) */
		  30% 100%,    /* softened bottom point (wider) */
		  0% 80%,      /* lower left */
		  0% 20%       /* upper left */
		  );

		  ">
      </div>

    </div>

    <!-- *** trim Tyle C *** -->
    <!-- ***             *** -->
    
    <div id="trimWheelTypeCDivId" style="position: relative; width: 300px; height: 300px;">
      <!-- Background image -->
      <img id="trimWheelTypeC"
           src="images/trimWheel.jpg"
           style="
		  position:absolute;
		  top:0;
		  left:0;
		  width:100%;
		  height:100%;
		  z-index:1;
		  ">

      <div id="trimApIndicatorTypeC"
	   style="
		  position:absolute;
		  top:0px;
		  left:80%;
		  transform:translateX(-50%);
		  padding:3px 8px;
		  background:blue;
		  color: white;
		  font-size:6px;
		  font-weight:bold;
		  border-radius:4px;
		  display:none;
		  z-index:3;
		  ">
	AP TRIM
      </div>

      <!-- Trim Needle -->
      <div id="trimWheelNeedleTypeC"
	   style="
		  position:absolute;
		  width:25px;
		  height:5px;
		  left:80%;
		  top:50%;
		  transform:translate(-50%, -50%);
		  background:#ff3333;
		  border-radius:3px;
		  z-index:2;
		  ">
      </div>

    </div>
