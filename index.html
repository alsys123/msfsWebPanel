<div id="asi" style="position: relative; width: 300px; height: 300px;">
  <img src="asi_background.png"
       style="position: absolute; width: 100%; height: 100%;">

  <img id="needle"
       src="needle.png"
       style="position: absolute; width: 100%; height: 100%;
              transform-origin: 50% 50%;
              transform: rotate(0deg);">
</div>

<script>
async function updateASI() {
  try {
    const res = await fetch("http://10.0.0.216:5000/data");
    const d = await res.json();

    const kts = d.airspeed;
    const MIN = 0;
    const MAX = 160;

    // Map airspeed to angle (-135° to +135°)
    const angle = -135 + (kts - MIN) / (MAX - MIN) * 270;

    document.getElementById("needle").style.transform =
      `rotate(${angle}deg)`;

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(updateASI, 200);
</script>
