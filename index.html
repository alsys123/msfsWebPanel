<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MSFS Airspeed Indicator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="topBar.css">
    
  </head>

  <body>

    <div id="topbar">
      <button id="basic4ID" class="panel-btn" data-panel="basic4">Basic4</button>
      <button class="panel-btn" data-panel="sixPack">Six Pack</button>
      <button class="panel-btn" data-panel="c172Lights">C172 Lights</button>
      
      <button id="testToggle">Test Mode: Pause</button>
    </div>

    
    <h2 id="panelTitle" >Aviation Panel</h2>
    
    <div id="asi">
      <canvas id="asiGauge" width="300" height="300"></canvas>
      <!--      <img id="bg" src="images/SpeedGauge172.png"> -->
      <div id="asiNeedle"></div>
    </div>

    <div id="alt">
      <canvas id="altGauge" width="300" height="300"></canvas>
      <div id="altNeedle"></div>
    </div>

    <div id="hdg">
      <canvas id="hdgGauge" width="300" height="300"></canvas>
      <div id="hdgLubber"></div>
    </div>

    <div id="timerClock">
      <canvas id="timerCanvas" width="300" height="300"></canvas>
    </div>
    
    <div id="hdgTypeB">
      <canvas id="hdgGaugeTypeB" width="300" height="300"></canvas>
      <div id="hdgLubberTypeB"></div>
    </div>

    <div id="attitudeDivId">
      <canvas id="attitudeCanvas" width="300" height="300"></canvas>
    </div>

    <div id="turnRateDivId">
      <canvas id="turnRateCanvas" width="300" height="300"></canvas>
    </div>

    <div id="vsiCanvasDivId">
      <canvas id="vsiCanvas" width="300" height="300"></canvas>
    </div>
    
    <script src="utils.js"></script>
    <script src="gauges/attitude.js"></script>
    <script src="gauges/timer.js"></script>
    <script src="gauges/turnRate.js"></script>
    <script src="gauges/headingTypeB.js"></script>
    <script src="gauges/vsi.js"></script>
    <script src="panelDefs.js"></script>
    <script src="msfsWebPanel.js"></script>
    <script src="c172SpeedGauge.js"></script>
    <script src="c172Alt.js"></script>
    <script src="c172Heading.js"></script>
    


  </body>
</html>
